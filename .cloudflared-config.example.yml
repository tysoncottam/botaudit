# Cloudflare Tunnel config for botaudit.
# Copy this to ~/.cloudflared/config.yml and replace TUNNEL_UUID.

tunnel: TUNNEL_UUID
credentials-file: /Users/tyson.cottam/.cloudflared/TUNNEL_UUID.json

# Tunnel sends all traffic to the local Node server. SSE needs disableChunkedEncoding
# false (the default) and a long write/idle timeout — audits can stream for 20+ min.
ingress:
  - hostname: botaudit.app
    service: http://localhost:3000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
      keepAliveConnections: 16
      keepAliveTimeout: 90s
  - hostname: www.botaudit.app
    service: http://localhost:3000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
  # Catch-all required by cloudflared
  - service: http_status:404
